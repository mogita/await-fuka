name: Release Publish

on:
  pull_request:
    types: [closed]

concurrency:
  group: release-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version from package.json
        id: version
        run: |
          set -euo pipefail
          version=$(jq -r .version package.json)
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version in package.json: $version"
            exit 1
          fi
          if git rev-parse "refs/tags/$version" >/dev/null 2>&1; then
            echo "::error::Tag $version already exists; refusing to publish."
            exit 1
          fi
          echo "Publishing $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build
        run: bun run build:prod

      - name: Verify artifact
        run: test -f build/index.tsx

      - name: Configure git identity
        env:
          ACTOR: ${{ github.event.pull_request.user.login }}
          ACTOR_ID: ${{ github.event.pull_request.user.id }}
        run: |
          git config user.name "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"

      - name: Tag merge commit
        env:
          TAG: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          url=$(gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            build/index.tsx)
          echo "Released: $url" >> "$GITHUB_STEP_SUMMARY"
